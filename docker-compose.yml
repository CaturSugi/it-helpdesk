version: '3.8'

services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: "HelpDesk Pro"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: it_helpdesk
      DB_USERNAME: helpdesk
      DB_PASSWORD: helpdesk_secret
      SESSION_DRIVER: file
      CACHE_DRIVER: file
      FILESYSTEM_DISK: public
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - logs_data:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - helpdesk_net

  # ── MySQL Database ───────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: helpdesk_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: it_helpdesk
      MYSQL_USER: helpdesk
      MYSQL_PASSWORD: helpdesk_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "helpdesk", "-phelpdesk_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - helpdesk_net

  # ── phpMyAdmin (opsional, untuk lihat database) ───────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: helpdesk_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: helpdesk
      PMA_PASSWORD: helpdesk_secret
    depends_on:
      - db
    networks:
      - helpdesk_net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  db_data:
  storage_data:
  logs_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  helpdesk_net:
    driver: bridge
